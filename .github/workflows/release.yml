name: Release to Chrome Web Store

# Publishes the extension when a version tag (e.g. v1.2.0) is pushed.
# Submitting goes into Google's review queue; it does not go live instantly.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # allow manual runs from the Actions tab

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build CSS
        run: npm run build

      - name: Package extension
        run: |
          mkdir -p dist
          zip -r dist/transcribed.zip \
            manifest.json \
            defaults.js core.js youtube.js spotify.js \
            popup.html popup.js popup.css \
            icons \
            PRIVACY.md
          echo "Zip contents:"
          unzip -l dist/transcribed.zip

      - name: Upload & publish to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v6.0.0
        with:
          file-path: dist/transcribed.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          publish: true
